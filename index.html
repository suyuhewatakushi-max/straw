<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 塔罗占卜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1e, #000);
            color: #e0d4ff;
            font-family: 'Noto Serif SC', sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
            opacity: 0.08; z-index: -1;
        }

        h1 { margin: 30px 0 10px; font-size: 2.8rem; text-shadow: 0 0 20px rgba(157, 78, 221, 0.8); }
        .subtitle { font-size: 1.1rem; opacity: 0.8; margin-bottom: 20px; }

        input {
            padding: 14px 20px; width: 85%; max-width: 420px;
            border-radius: 50px; border: 2px solid #6b4e9e;
            background: rgba(30, 20, 50, 0.9); color: white;
            font-size: 1.1rem; margin: 15px auto; display: block;
        }

        button {
            padding: 12px 28px; margin: 8px;
            border: none; border-radius: 50px;
            background: linear-gradient(45deg, #7c3aed, #c026d3);
            color: white; font-size: 1.1rem; cursor: pointer;
        }

        button:hover { transform: translateY(-3px); }

        .table {
            position: relative; width: 100%; min-height: 420px;
            margin: 30px auto; padding: 20px 10px;
            display: flex; justify-content: center; align-items: center;
            gap: 20px; flex-wrap: wrap; max-width: 1100px;
        }

        .card {
            width: 130px; height: 200px; perspective: 1200px;
            opacity: 0; transform: scale(0.6);
            transition: all 0.6s ease;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card { width: 105px; height: 160px; }
        }

        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.9s;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            overflow: hidden; border: 3px solid #4c1d95;
        }

        .front { transform: rotateY(180deg); }

        img { width: 100%; height: 100%; object-fit: cover; display: block; }

        #result {
            margin: 30px auto; padding: 25px; max-width: 720px;
            background: rgba(30, 20, 50, 0.85); border-radius: 16px;
            border: 1px solid #7c3aed; line-height: 1.8; text-align: left;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <h1>🔮 塔罗占卜</h1>
    <p class="subtitle">聆听命运的低语</p >

    <input id="question" placeholder="请输入你的问题，例如：我最近的事业运势如何？">

    <div>
        <button onclick="draw(1)">单牌占卜</button>
        <button onclick="draw(3)">三牌阵</button>
        <button onclick="draw(5)">五牌阵</button>
    </div>

    <p id="status">请输入问题，开始占卜...</p >

    <div class="table" id="table"></div>
    <div id="result"></div>

    <script>
        const cards = [
            { name: "愚者", img: "img/The_Fool.png" },
            { name: "魔术师", img: "img/The_Magician.png" },
            { name: "女祭司", img: "img/The_High_Priestess.png" },
            { name: "皇后", img: "img/The_Empress.png" },
            { name: "皇帝", img: "img/The_Emperor.png" },
            { name: "教皇", img: "img/The_Hierophant.png" },
            { name: "恋人", img: "img/The_Lovers.png" },
            { name: "战车", img: "img/The_Chariot.png" },
            { name: "力量", img: "img/The_Strength.png" },
            { name: "隐士", img: "img/The_Hermit.png" },
            { name: "命运之轮", img: "img/The_Wheel_of_Fortune.png" },
            { name: "正义", img: "img/The_Justice.png" },
            { name: "倒吊人", img: "img/The_Hanged_Man.png" },
            { name: "死神", img: "img/The_Death.png" },
            { name: "节制", img: "img/The_Temperance.png" },
            { name: "恶魔", img: "img/The_Devil.png" },
            { name: "高塔", img: "img/The_Tower.png" },
            { name: "星星", img: "img/The_Star.png" },
            { name: "月亮", img: "img/The_Moon.png" },
            { name: "太阳", img: "img/The_Sun.png" },
            { name: "审判", img: "img/The_Judgement.png" },
            { name: "世界", img: "img/The_World.png" }
        ];

        let deck = [];

        function shuffle() { deck = [...cards].sort(() => Math.random() - 0.5); }
        function drawCard() {
            if (deck.length === 0) shuffle();
            return deck.pop();
        }

        function buildCardsText(drawnCards) {
            return drawnCards.map((c, i) => 
                `第${i+1}张：${c.name}（${c.reversed ? '逆位' : '正位'}）`
            ).join('\n');
        }

        async function callAI(question, cardsText) {
            const YOUR_API_KEY = "sk-9697ca967f174d5182628360a195c087"; // 改成你自己的Key
            try {
                const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + YOUR_API_KEY
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ 
                            role: "user", 
                            content: `你是塔罗占卜师。\n问题：${question}\n牌阵：\n${cardsText}\n请逐张解释正位或逆位，并给出整体建议。语气神秘庄重，不要提AI。` 
                        }]
                    })
                });
                const data = await res.json();
                return data.choices?.[0]?.message?.content || "命运暂时无法回应...";
            } catch (e) {
                return "🔮 与星辰的连接出现了波动，请稍后再试。";
            }
        }

        function renderTable(drawnCards) {
            const table = document.getElementById("table");
            table.innerHTML = "";

            drawnCards.forEach((cardInfo, i) => {
                const cardEl = document.createElement("div");
                cardEl.className = "card";
                if (cardInfo.reversed) cardEl.classList.add("reversed");

                // 使用 DOM 创建，避免字符串错误
                const inner = document.createElement("div");
                inner.className = "card-inner";

                const backFace = document.createElement("div");
                backFace.className = "face back";
                const backImg = document.createElement("img");
                backImg.src = "img/back.png";
                backImg.alt = "塔罗背面";
                backFace.appendChild(backImg);

                const frontFace = document.createElement("div");
                frontFace.className = "face front";
                const frontImg = document.createElement("img");
                frontImg.src = cardInfo.img;
                frontImg.alt = cardInfo.name;
                frontFace.appendChild(frontImg);

                inner.appendChild(backFace);
                inner.appendChild(frontFace);
                cardEl.appendChild(inner);

                table.appendChild(cardEl);

                // 动画
                setTimeout(() => {
                    cardEl.style.opacity = "1";
                    cardEl.style.transform = `scale(1) rotate(${Math.random()*8 - 4}deg)`;
                    setTimeout(() => cardEl.classList.add("flipped"), 400 + i * 180);
                }, 100 + i * 120);
            });
        }

        async function draw(count) {
            const question = document.getElementById("question").value.trim();
            const statusEl = document.getElementById("status");
            const resultEl = document.getElementById("result");

            if (!question) {
                statusEl.innerText = "⚠️ 请先输入你的问题";
                return;
            }

            statusEl.innerText = "🔮 正在洗牌...";
            resultEl.innerHTML = "";
            document.getElementById("table").innerHTML = "";

            const drawnCards = [];
            for (let i = 0; i < count; i++) {
                const card = drawCard();
                card.reversed = Math.random() < 0.5;
                drawnCards.push(card);
            }

            renderTable(drawnCards);
            statusEl.innerText = "🔮 命运正在揭示...";

            const interpretation = await callAI(question, buildCardsText(drawnCards));

            statusEl.innerText = "✨ 解读完成";
            resultEl.innerHTML = `<strong>问题：</strong> ${question}<br><br>${interpretation}`;
        }

        document.getElementById("question").addEventListener("keypress", e => {
            if (e.key === "Enter") draw(1);
        });

        shuffle();
    </script>
</body>
</html>
